<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Sundrop Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:15px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

input,button{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
cursor:pointer;
background:#1976d2;
color:#fff;
}

.summary{
display:flex;
flex-wrap:wrap;
gap:20px;
margin:15px 0;
font-weight:bold;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #000;
padding:6px;
text-align:center;
}

th{
background:#1976d2;
color:#fff;
position:sticky;
top:0;
}

.red{
color:red;
font-weight:bold;
}

@media(max-width:768px){body{padding:8px}.container{padding:10px;overflow-x:auto}.filters{flex-direction:column}.filters input,.filters button{width:100%}table{font-size:10px;min-width:900px}th,td{padding:4px;white-space:nowrap}.summary{flex-direction:column;font-size:16px;gap:8px}}
</style>
</head>

<body>

<div class="container" id="reportArea">

<h1>DYNAMIC SUNDROP</h1>

<div class="filters">
<input type="text" id="dealerSearch" placeholder="Dealer Search">
<input type="text" id="skuSearch" placeholder="SKU Search">

<input type="number" id="outstanding"
placeholder="Outstanding Amount" value="0">

<button onclick="sortAging()">Sort Aging</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportJPG()">Export JPG</button>
<button onclick="shareWhatsApp()">Share WhatsApp</button>
</div>

<div class="summary">
<div>Total Amount : ₹ <span id="totalAmount">0</span></div>
<div>Outstanding : ₹ <span id="outAmount">0</span></div>
<div>Net Amount : ₹ <span id="netAmount">0</span></div>
</div>

<table id="stockTable">
<thead>
<tr>
<th>SR NO.</th>
<th>IMEI</th>
<th>SKU NAME</th>
<th>AMOUNT</th>
<th>DELAR NAME</th>
<th>INVOICE NO.</th>
<th>INVOICE DATE</th>
<th>DYNAMIC SUNDROP</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const SHEET_ID =
"1nq1C54n6W68zbUBw19HxGNd5VUNM7vPhYw1PoCP0htA";

const SHEET_NAME = "Sheet1";

let stockData = [];
let descSort = true;

function loadData(){

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

fetch(url)
.then(res => res.text())
.then(rep => {

const jsonData =
JSON.parse(rep.substring(47).slice(0,-2));

const rows = jsonData.table.rows;

stockData = rows.map(r => ({

imei: r.c[0]?.v || "",
sku: r.c[1]?.v || "",
amount: Number(r.c[2]?.v || 0),
dealer: r.c[3]?.v || "",
invoiceNo: r.c[4]?.v || "",
invoiceDate: r.c[5]?.f || "",
aging: Number(r.c[6]?.v || 0)

}));

renderTable(stockData);

})
.catch(err=>{
console.log(err);
alert("Google Sheet Data Fetch Error");
});

}

function renderTable(data){

const tbody =
document.querySelector("#stockTable tbody");

tbody.innerHTML = "";

let total = 0;

data.forEach((row,index)=>{

total += row.amount;

const tr =
document.createElement("tr");

tr.innerHTML = `

<td>${index+1}</td>
<td>${row.imei}</td>
<td>${row.sku}</td>
<td>${row.amount.toLocaleString()}</td>
<td>${row.dealer}</td>
<td>${row.invoiceNo}</td>
<td>${row.invoiceDate}</td>
<td class="${row.aging>45?'red':''}">
${row.aging}
</td>

`;

tbody.appendChild(tr);

});

document.getElementById("totalAmount")
.innerText = total.toLocaleString();

calculateNet();

}

function calculateNet(){

let total =
Number(
document.getElementById("totalAmount")
.innerText.replace(/,/g,'')
);

let outstanding =
Number(
document.getElementById("outstanding")
.value
);

document.getElementById("outAmount")
.innerText =
outstanding.toLocaleString();

document.getElementById("netAmount")
.innerText =
(total-outstanding).toLocaleString();

}

document.getElementById("outstanding")
.addEventListener("input",calculateNet);

document.getElementById("dealerSearch")
.addEventListener("keyup",filterData);

document.getElementById("skuSearch")
.addEventListener("keyup",filterData);

function filterData(){

const dealer =
document.getElementById("dealerSearch")
.value.toLowerCase();

const sku =
document.getElementById("skuSearch")
.value.toLowerCase();

const filtered =
stockData.filter(r =>

r.dealer.toLowerCase().includes(dealer)
&&
r.sku.toLowerCase().includes(sku)

);

renderTable(filtered);

}

function sortAging(){

stockData.sort((a,b)=>{

return descSort
? b.aging-a.aging
: a.aging-b.aging;

});

descSort = !descSort;

renderTable(stockData);

}

async function exportJPG(){

const canvas =
await html2canvas(
document.getElementById("reportArea")
);

const link =
document.createElement("a");

link.download =
"Stock_Aging_Report.jpg";

link.href =
canvas.toDataURL("image/jpeg");

link.click();

}

async function exportPDF(){

const canvas =
await html2canvas(
document.getElementById("reportArea")
);

const img =
canvas.toDataURL("image/png");

const { jsPDF } =
window.jspdf;

const pdf =
new jsPDF(
'landscape',
'mm',
'a4'
);

pdf.addImage(
img,
'PNG',
5,
5,
287,
0
);

pdf.save(
"Stock_Aging_Report.pdf"
);

}


async function shareWhatsApp(){

const canvas = await html2canvas(document.getElementById("reportArea"));
const link = document.createElement("a");
link.download = "Stock_Aging_Report.jpg";
link.href = canvas.toDataURL("image/jpeg");

// Try native share (Android/mobile)
if(navigator.share && navigator.canShare){
    const res = await fetch(link.href);
    const blob = await res.blob();
    const file = new File([blob],"Stock_Aging_Report.jpg",{type:"image/jpeg"});
    if(navigator.canShare({files:[file]})){
        try{
            await navigator.share({
                title:"Stock Aging Report",
                text:"Stock Aging Report",
                files:[file]
            });
            return;
        }catch(e){}
    }
}

// Fallback: open WhatsApp
window.open("https://wa.me/?text="+encodeURIComponent("Stock Aging Report"),"_blank");
}


loadData();

</script>

</body>
</html>
